<!DOCTYPE html>
<html>
<head>
    <title>Delete Folder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="card">
        <h3>Delete Folder: {{ folder }}</h3>

        {% if has_files %}
            <p style="color:red;">
                ⚠️ This folder contains files. All contents will be deleted.
            </p>
        {% else %}
            <p>This folder is empty.</p>
        {% endif %}

        <form method="POST" action="/delete-folder">
            <input type="hidden" name="bucket" value="{{ bucket }}">
            <input type="hidden" name="folder" value="{{ folder }}">
            <button type="submit" class="danger">Confirm Delete</button>
        </form>

        <br>
        <a href="/bucket/{{ bucket }}">Cancel</a>
    </div>

</div>
</body>
</html>
