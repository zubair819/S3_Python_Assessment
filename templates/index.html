<!DOCTYPE html>
<html>
<head>
    <title>S3 File Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <h2>S3 File Manager</h2>

    <div class="card">
        <h3>Create Bucket</h3>
        <form method="POST" action="/create-bucket">
            <input type="text" name="bucket_name" placeholder="Bucket name" required>
            <button type="submit">Create</button>
        </form>
    </div>

    <div class="card">
        <h3>Available Buckets</h3>
        <table>
            <tr>
                <th>Bucket Name</th>
                <th>Action</th>
            </tr>
            {% for bucket in buckets %}
            <tr>
                <td>{{ bucket.Name }}</td>
                <td>
                    <a href="/bucket/{{ bucket.Name }}">Open</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
